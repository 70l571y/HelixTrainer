version: 2

project_name: hxtrainer

before:
  hooks:
    - go test ./...

builds:
  - main: ./cmd/hxtrainer
    binary: hxtrainer
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X github.com/70l571y/HelixTrainer/internal/buildinfo.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: git
